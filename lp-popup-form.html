<script>
    // Get elements
    const modal = document.getElementById('leadFormModal');
    const form = document.getElementById('leadForm');
    const closeBtn = document.getElementById('closeModal');
    const continueBtn = document.getElementById('continueBtn');
    const backBtn = document.getElementById('backBtn');
    const submitBtn = document.getElementById('submitBtn');

    const step1 = document.getElementById('step1');
    const step2 = document.getElementById('step2');
    const progressDots = document.querySelectorAll('.dot');

    let currentStep = 1;

    // Close modal
    closeBtn.addEventListener('click', closeModal);
    modal.addEventListener('click', function(e) {
        if (e.target === modal) closeModal();
    });

    document.querySelector('.modal-container').addEventListener('click', function(e) {
        e.stopPropagation();
    });

    function openModal() {
        modal.classList.add('active');
        document.body.style.overflow = 'hidden';
        resetForm();
    }

    function closeModal() {
        modal.classList.remove('active');
        document.body.style.overflow = '';
    }

    // base.js calls this after opening the modal
    function resetForm() {
        currentStep = 1;
        step1.classList.add('active');
        step2.classList.remove('active');
        updateProgressDots();
        clearAllErrors();
        form.reset();
    }

    // Step 1 → Step 2
    continueBtn.addEventListener('click', function() {
        clearAllErrors();

        const full_name = document.getElementById('full_name').value.trim();
        const email = document.getElementById('email').value.trim();
        let isValid = true;

        if (!full_name) {
            showError('full_name', 'Full name is required');
            isValid = false;
        }
        if (!email) {
            showError('email', 'Email is required');
            isValid = false;
        } else if (!validateEmail(email)) {
            showError('email', 'Please enter a valid email');
            isValid = false;
        }

        if (isValid) goToStep(2);
    });

    // Step 2 → Step 1
    backBtn.addEventListener('click', function() {
        goToStep(1);
    });

    // Validate Step 2 before base.js takes over the submit
    submitBtn.addEventListener('click', function(e) {
        clearAllErrors();

        const phone = document.getElementById('phone').value.trim();
        const city = document.getElementById('city').value.trim();
        let isValid = true;

        if (!phone) {
            showError('phone', 'Phone number is required');
            isValid = false;
        } else if (!validateIndianPhone(phone)) {
            showError('phone', 'Please enter a valid 10-digit Indian mobile number');
            isValid = false;
        }
        if (!city) {
            showError('city', 'City is required');
            isValid = false;
        }

        if (!isValid) e.preventDefault();
    });

    function goToStep(stepNumber) {
        if (stepNumber === 2) {
            step1.classList.add('slide-out-left');
            setTimeout(() => {
                step1.classList.remove('active', 'slide-out-left');
                step2.classList.add('active');
                currentStep = 2;
                updateProgressDots();
            }, 400);
        } else {
            step2.classList.remove('active');
            step1.classList.add('active', 'slide-in-left');
            setTimeout(() => { step1.classList.remove('slide-in-left'); }, 500);
            currentStep = 1;
            updateProgressDots();
        }
    }

    function updateProgressDots() {
        progressDots.forEach((dot, index) => {
            dot.classList.toggle('active', index + 1 <= currentStep);
        });
    }

    // Phone: digits only
    document.getElementById('phone').addEventListener('input', function(e) {
        e.target.value = e.target.value.replace(/\D/g, '');
    });

    function validateEmail(email) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    function validateIndianPhone(phone) {
        return /^[6-9]\d{9}$/.test(phone);
    }

    function showError(fieldId, message) {
        const input = document.getElementById(fieldId);
        const error = document.getElementById(fieldId + 'Error');
        input.classList.add('error');
        error.textContent = message;
        error.classList.add('show');
        if (!document.querySelector('.form-input.error:focus')) input.focus();
    }

    function clearError(fieldId) {
        const input = document.getElementById(fieldId);
        const error = document.getElementById(fieldId + 'Error');
        input.classList.remove('error');
        error.classList.remove('show');
    }

    function clearAllErrors() {
        ['full_name', 'email', 'phone', 'city'].forEach(clearError);
    }

    // ESC closes modal
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && modal.classList.contains('active')) closeModal();
    });

    // Enter on Step 1 continues
    step1.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') { e.preventDefault(); continueBtn.click(); }
    });
</script>
